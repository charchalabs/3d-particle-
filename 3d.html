<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gesture Controlled 3D Particle System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        
        #ui {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }
        
        button {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 60px;
        }
        
        button.active {
            background: rgba(255, 100, 100, 0.5);
            border-color: #ff6464;
            box-shadow: 0 0 20px rgba(255, 100, 100, 0.5);
        }
        
        #gesture-status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        #color-picker {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }
        
        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.5);
            transition: transform 0.2s;
        }
        
        .color-dot:active {
            transform: scale(1.2);
        }
        
        @media (max-width: 600px) {
            button {
                padding: 10px 15px;
                font-size: 12px;
            }
            #gesture-status {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="gesture-status">🖐️ Open Hand - Expand | ✊ Fist - Contract</div>
    
    <div id="color-picker">
        <div class="color-dot" style="background: #ff4444;" data-color="#ff4444"></div>
        <div class="color-dot" style="background: #44ff44;" data-color="#44ff44"></div>
        <div class="color-dot" style="background: #4444ff;" data-color="#4444ff"></div>
        <div class="color-dot" style="background: #ffff44;" data-color="#ffff44"></div>
        <div class="color-dot" style="background: #ff44ff;" data-color="#ff44ff"></div>
    </div>
    
    <div id="ui">
        <button id="heart-btn">❤️ Heart</button>
        <button id="flower-btn">🌸 Flower</button>
        <button id="saturn-btn">🪐 Saturn</button>
        <button id="firework-btn">🎆 Firework</button>
        <button id="galaxy-btn">🌌 Galaxy</button>
        <button id="reset-btn">🔄 Reset</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Main application class
        class GestureParticleSystem {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.particles = [];
                this.currentShape = 'galaxy';
                this.currentColor = '#ff4444';
                this.particleCount = 2000;
                this.isExpanding = false;
                this.animationSpeed = 1;
                
                // Hand tracking variables
                this.video = null;
                this.handLandmarks = null;
                this.gestureState = 'none'; // 'open', 'fist', 'none'
                this.lastGestureTime = 0;
                
                this.init();
            }

            async init() {
                // Setup renderer
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                document.getElementById('canvas-container').appendChild(this.renderer.domElement);
                
                // Setup camera
                this.camera.position.z = 15;
                this.camera.position.y = 2;
                
                // Add ambient light
                const ambientLight = new THREE.AmbientLight(0x404040);
                this.scene.add(ambientLight);
                
                // Add point lights for better visibility
                const light1 = new THREE.PointLight(0xffffff, 1, 100);
                light1.position.set(10, 10, 10);
                this.scene.add(light1);
                
                const light2 = new THREE.PointLight(0x8888ff, 0.5, 100);
                light2.position.set(-10, -10, -10);
                this.scene.add(light2);
                
                // Create starfield background
                this.createStarfield();
                
                // Create initial particles
                this.createParticles('galaxy');
                
                // Setup controls
                this.setupControls();
                
                // Setup camera for hand tracking
                await this.setupCamera();
                
                // Setup UI events
                this.setupUI();
                
                // Handle window resize
                window.addEventListener('resize', () => this.onWindowResize());
                
                // Start animation loop
                this.animate();
            }

            createStarfield() {
                const starsGeometry = new THREE.BufferGeometry();
                const starsCount = 2000;
                const starsPositions = new Float32Array(starsCount * 3);
                
                for (let i = 0; i < starsCount * 3; i += 3) {
                    starsPositions[i] = (Math.random() - 0.5) * 200;
                    starsPositions[i + 1] = (Math.random() - 0.5) * 200;
                    starsPositions[i + 2] = (Math.random() - 0.5) * 200;
                }
                
                starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
                const starsMaterial = new THREE.PointsMaterial({
                    color: 0xffffff,
                    size: 0.1,
                    transparent: true,
                    blending: THREE.AdditiveBlending
                });
                
                this.starfield = new THREE.Points(starsGeometry, starsMaterial);
                this.scene.add(this.starfield);
            }

            createParticles(shape) {
                // Remove existing particles
                if (this.particleSystem) {
                    this.scene.remove(this.particleSystem);
                }
                
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(this.particleCount * 3);
                const colors = new Float32Array(this.particleCount * 3);
                
                const color = new THREE.Color(this.currentColor);
                
                switch(shape) {
                    case 'heart':
                        this.createHeartShape(positions, colors, color);
                        break;
                    case 'flower':
                        this.createFlowerShape(positions, colors, color);
                        break;
                    case 'saturn':
                        this.createSaturnShape(positions, colors, color);
                        break;
                    case 'firework':
                        this.createFireworkShape(positions, colors, color);
                        break;
                    case 'galaxy':
                        this.createGalaxyShape(positions, colors, color);
                        break;
                    default:
                        this.createGalaxyShape(positions, colors, color);
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                
                const material = new THREE.PointsMaterial({
                    size: 0.15,
                    vertexColors: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    transparent: true,
                    opacity: 0.8
                });
                
                this.particleSystem = new THREE.Points(geometry, material);
                this.scene.add(this.particleSystem);
                this.currentShape = shape;
            }

            createHeartShape(positions, colors, baseColor) {
                for (let i = 0; i < this.particleCount; i++) {
                    const t = (i / this.particleCount) * Math.PI * 2;
                    const scale = 3;
                    
                    // Parametric heart equation
                    const x = 16 * Math.pow(Math.sin(t), 3) * 0.2 * scale;
                    const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.2 * scale;
                    const z = (Math.random() - 0.5) * 0.5;
                    
                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;
                    
                    const colorVariation = new THREE.Color(baseColor).multiplyScalar(0.7 + Math.random() * 0.6);
                    colors[i * 3] = colorVariation.r;
                    colors[i * 3 + 1] = colorVariation.g;
                    colors[i * 3 + 2] = colorVariation.b;
                }
            }

            createFlowerShape(positions, colors, baseColor) {
                const petals = 6;
                for (let i = 0; i < this.particleCount; i++) {
                    const angle = (i / this.particleCount) * Math.PI * 2 * petals;
                    const radius = Math.sin(angle * 2) * 3 + 1;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    const z = (Math.random() - 0.5) * 0.8;
                    
                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;
                    
                    const colorVariation = new THREE.Color(baseColor).multiplyScalar(0.8 + Math.random() * 0.4);
                    colors[i * 3] = colorVariation.r;
                    colors[i * 3 + 1] = colorVariation.g;
                    colors[i * 3 + 2] = colorVariation.b;
                }
            }

            createSaturnShape(positions, colors, baseColor) {
                for (let i = 0; i < this.particleCount; i++) {
                    const t = (i / this.particleCount) * Math.PI * 2;
                    const isRing = Math.random() < 0.4;
                    
                    if (isRing) {
                        const ringRadius = 4 + Math.random() * 0.5;
                        const x = Math.cos(t) * ringRadius;
                        const y = Math.sin(t) * ringRadius * 0.3;
                        const z = (Math.random() - 0.5) * 0.2;
                        
                        positions[i * 3] = x;
                        positions[i * 3 + 1] = y;
                        positions[i * 3 + 2] = z;
                    } else {
                        const sphereRadius = 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        const theta = Math.random() * Math.PI * 2;
                        
                        positions[i * 3] = sphereRadius * Math.sin(phi) * Math.cos(theta);
                        positions[i * 3 + 1] = sphereRadius * Math.sin(phi) * Math.sin(theta);
                        positions[i * 3 + 2] = sphereRadius * Math.cos(phi);
                    }
                    
                    const colorVariation = new THREE.Color(baseColor).multiplyScalar(0.7 + Math.random() * 0.6);
                    colors[i * 3] = colorVariation.r;
                    colors[i * 3 + 1] = colorVariation.g;
                    colors[i * 3 + 2] = colorVariation.b;
                }
            }

            createFireworkShape(positions, colors, baseColor) {
                const burstCount = 8;
                const particlesPerBurst = Math.floor(this.particleCount / burstCount);
                
                for (let i = 0; i < this.particleCount; i++) {
                    const burstIndex = Math.floor(i / particlesPerBurst);
                    const burstAngle = (burstIndex / burstCount) * Math.PI * 2;
                    const spreadAngle = burstAngle + (Math.random() - 0.5) * 0.8;
                    const radius = Math.random() * 4;
                    
                    const x = Math.cos(spreadAngle) * radius;
                    const y = Math.sin(spreadAngle) * radius;
                    const z = (Math.random() - 0.5) * 2;
                    
                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;
                    
                    const burstColor = new THREE.Color().setHSL((burstIndex / burstCount), 1, 0.5);
                    const colorVariation = burstColor.multiplyScalar(0.8 + Math.random() * 0.4);
                    colors[i * 3] = colorVariation.r;
                    colors[i * 3 + 1] = colorVariation.g;
                    colors[i * 3 + 2] = colorVariation.b;
                }
            }

            createGalaxyShape(positions, colors, baseColor) {
                const arms = 3;
                for (let i = 0; i < this.particleCount; i++) {
                    const t = (i / this.particleCount) * Math.PI * 2 * arms;
                    const radius = (i / this.particleCount) * 5 + 0.1;
                    const x = Math.cos(t + radius) * radius;
                    const y = Math.sin(t + radius) * radius * 0.3;
                    const z = (Math.random() - 0.5) * 0.5;
                    
                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;
                    
                    const colorVariation = new THREE.Color(baseColor).multiplyScalar(0.5 + (radius / 5) * 0.8);
                    colors[i * 3] = colorVariation.r;
                    colors[i * 3 + 1] = colorVariation.g;
                    colors[i * 3 + 2] = colorVariation.b;
                }
            }

            async setupCamera() {
                // Check if we're on mobile
                const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
                
                try {
                    this.video = document.createElement('video');
                    this.video.setAttribute('playsinline', '');
                    this.video.setAttribute('autoplay', '');
                    
                    const constraints = {
                        video: {
                            facingMode: isMobile ? 'user' : 'environment',
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    };
                    
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    this.video.srcObject = stream;
                    await this.video.play();
                    
                    // For actual hand tracking, we would use MediaPipe Hands or TensorFlow.js
                    // This is a simplified gesture simulation using video brightness
                    this.simulateGestures();
                    
                } catch (error) {
                    console.log('Camera access denied or not available, using touch gestures');
                    document.getElementById('gesture-status').textContent = '📱 Use touch/click to control particles';
                    this.useTouchGestures();
                }
            }

            simulateGestures() {
                // Create a canvas for video processing
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = 320;
                canvas.height = 240;
                
                setInterval(() => {
                    if (this.video && this.video.readyState === this.video.HAVE_ENOUGH_DATA) {
                        context.drawImage(this.video, 0, 0, canvas.width, canvas.height);
                        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        
                        let brightness = 0;
                        for (let i = 0; i < data.length; i += 4) {
                            brightness += (data[i] + data[i + 1] + data[i + 2]) / 3;
                        }
                        brightness /= (data.length / 4);
                        
                        // Simple gesture detection based on brightness
                        // Dark (fist) = contract, Light (open hand) = expand
                        const now = Date.now();
                        if (brightness < 80 && this.gestureState !== 'fist') {
                            this.gestureState = 'fist';
                            this.isExpanding = false;
                            document.getElementById('gesture-status').textContent = '✊ Fist Detected - Contracting';
                            this.lastGestureTime = now;
                        } else if (brightness > 120 && this.gestureState !== 'open') {
                            this.gestureState = 'open';
                            this.isExpanding = true;
                            document.getElementById('gesture-status').textContent = '🖐️ Open Hand Detected - Expanding';
                            this.lastGestureTime = now;
                        }
                    }
                }, 100);
            }

            useTouchGestures() {
                let touchStartTime;
                document.addEventListener('touchstart', (e) => {
                    touchStartTime = Date.now();
                    this.isExpanding = true;
                });
                
                document.addEventListener('touchend', (e) => {
                    const touchDuration = Date.now() - touchStartTime;
                    if (touchDuration < 200) {
                        // Quick tap - change shape
                        const shapes = ['heart', 'flower', 'saturn', 'firework', 'galaxy'];
                        const currentIndex = shapes.indexOf(this.currentShape);
                        const nextShape = shapes[(currentIndex + 1) % shapes.length];
                        this.createParticles(nextShape);
                    } else {
                        this.isExpanding = false;
                    }
                });
                
                document.addEventListener('mousedown', () => {
                    this.isExpanding = true;
                });
                
                document.addEventListener('mouseup', () => {
                    this.isExpanding = false;
                });
            }

            setupControls() {
                // Remove OrbitControls for gesture-based interaction
                // Instead, add subtle auto-rotation
                this.autoRotate = true;
            }

            setupUI() {
                // Shape buttons
                document.getElementById('heart-btn').addEventListener('click', () => {
                    this.createParticles('heart');
                    this.updateActiveButton('heart-btn');
                });
                
                document.getElementById('flower-btn').addEventListener('click', () => {
                    this.createParticles('flower');
                    this.updateActiveButton('flower-btn');
                });
                
                document.getElementById('saturn-btn').addEventListener('click', () => {
                    this.createParticles('saturn');
                    this.updateActiveButton('saturn-btn');
                });
                
                document.getElementById('firework-btn').addEventListener('click', () => {
                    this.createParticles('firework');
                    this.updateActiveButton('firework-btn');
                });
                
                document.getElementById('galaxy-btn').addEventListener('click', () => {
                    this.createParticles('galaxy');
                    this.updateActiveButton('galaxy-btn');
                });
                
                document.getElementById('reset-btn').addEventListener('click', () => {
                    this.camera.position.set(0, 2, 15);
                    this.createParticles('galaxy');
                    this.updateActiveButton('galaxy-btn');
                });
                
                // Color picker
                document.querySelectorAll('.color-dot').forEach(dot => {
                    dot.addEventListener('click', (e) => {
                        this.currentColor = e.target.dataset.color;
                        this.createParticles(this.currentShape);
                    });
                });
                
                // Initial active button
                this.updateActiveButton('galaxy-btn');
            }

            updateActiveButton(activeId) {
                document.querySelectorAll('button').forEach(btn => {
                    btn.classList.remove('active');
                });
                document.getElementById(activeId)?.classList.add('active');
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                
                // Auto-rotate
                if (this.autoRotate && this.particleSystem) {
                    this.particleSystem.rotation.y += 0.003;
                    this.particleSystem.rotation.x += 0.001;
                }
                
                // Starfield rotation
                if (this.starfield) {
                    this.starfield.rotation.y += 0.0001;
                    this.starfield.rotation.x += 0.00005;
                }
                
                // Gesture-based particle scaling
                if (this.particleSystem) {
                    const targetScale = this.isExpanding ? 1.5 : 1.0;
                    this.particleSystem.scale.lerp(
                        new THREE.Vector3(targetScale, targetScale, targetScale),
                        0.1
                    );
                    
                    // Color pulse based on gesture
                    if (this.isExpanding && Date.now() % 500 < 250) {
                        this.particleSystem.material.opacity = 0.9;
                    } else {
                        this.particleSystem.material.opacity = 0.8;
                    }
                }
                
                this.renderer.render(this.scene, this.camera);
            }
        }

        // Initialize the application
        const app = new GestureParticleSystem();
        
        console.log('🌟 3D Gesture Particle System Ready!');
        console.log('📱 Mobile: Use touch gestures');
        console.log('💻 Desktop: Allow camera for hand tracking');
        console.log('👆 Tap quickly to change shapes');
        console.log('👆 Long press to toggle expansion');
    </script>
</body>
</html>
